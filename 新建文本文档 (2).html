<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阚· 八字紫微算命</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
        }
        .simple-bg {
            background-color: #f8f4eb;
        }
        .card {
            background: #ffffff;
            border: 1px solid #d1c2a8;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .accent {
            color: #5c4033;
        }
        .input-focus {
            transition: all 0.3s;
        }
        .input-focus:focus {
            border-color: #8b5a2b;
            box-shadow: 0 0 0 3px rgba(139, 90, 43, 0.1);
        }
        .result-section {
            animation: fadeInUp 0.6s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="simple-bg text-zinc-800 min-h-screen py-12">
    <div class="max-w-2xl mx-auto px-6">
        <!-- 头部 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-medium tracking-wide accent">阚</h1>
            <p class="text-zinc-500 mt-1">传统八字 · 紫微斗数 · 精准一生运势</p>
        </div>

        <!-- 输入表单 -->
        <div id="formCard" class="card rounded-3xl p-8">
            <form id="fortuneForm" class="space-y-8">
                <!-- 农历提示 -->
                <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-sm text-amber-700 flex items-start gap-3">
                    <i class="fa-solid fa-info-circle mt-0.5"></i>
                    <div>
                        <strong>请使用农历（阴历）填写出生年月日</strong><br>
                        <span class="text-xs">公历请自行转换为农历后再填写</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- 年 -->
                    <div>
                        <label class="block text-zinc-500 text-sm mb-2">出生年份（农历）</label>
                        <select id="year" class="input-focus w-full bg-white border border-zinc-300 rounded-2xl px-5 py-3.5 focus:outline-none text-base"></select>
                    </div>
                    <!-- 月 -->
                    <div>
                        <label class="block text-zinc-500 text-sm mb-2">出生月份（农历）</label>
                        <select id="month" class="input-focus w-full bg-white border border-zinc-300 rounded-2xl px-5 py-3.5 focus:outline-none text-base"></select>
                    </div>
                    <!-- 日 -->
                    <div>
                        <label class="block text-zinc-500 text-sm mb-2">出生日期（农历）</label>
                        <select id="day" class="input-focus w-full bg-white border border-zinc-300 rounded-2xl px-5 py-3.5 focus:outline-none text-base"></select>
                    </div>
                </div>

                <!-- 时辰 -->
                <div>
                    <label class="block text-zinc-500 text-sm mb-2">出生时辰（对应现代时间）</label>
                    <select id="shichen" class="input-focus w-full bg-white border border-zinc-300 rounded-2xl px-5 py-3.5 focus:outline-none text-base">
                        <option value="0">子时 (23:00-01:00)</option>
                        <option value="1">丑时 (01:00-03:00)</option>
                        <option value="2">寅时 (03:00-05:00)</option>
                        <option value="3">卯时 (05:00-07:00)</option>
                        <option value="4">辰时 (07:00-09:00)</option>
                        <option value="5">巳时 (09:00-11:00)</option>
                        <option value="6">午时 (11:00-13:00)</option>
                        <option value="7">未时 (13:00-15:00)</option>
                        <option value="8">申时 (15:00-17:00)</option>
                        <option value="9">酉时 (17:00-19:00)</option>
                        <option value="10">戌时 (19:00-21:00)</option>
                        <option value="11">亥时 (21:00-23:00)</option>
                    </select>
                </div>

                <!-- 出生地（省份 + 精确县/区） -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-zinc-500 text-sm mb-2">出生省份</label>
                        <select id="province" class="input-focus w-full bg-white border border-zinc-300 rounded-2xl px-5 py-3.5 focus:outline-none text-base">
                            <!-- JS填充 -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-zinc-500 text-sm mb-2">城市 / 县（精确填写）</label>
                        <input type="text" id="city" placeholder="例如：海淀区 或 义乌市" 
                               class="input-focus w-full bg-white border border-zinc-300 rounded-2xl px-5 py-3.5 focus:outline-none text-base">
                    </div>
                </div>

                <!-- 性别 -->
                <div>
                    <label class="block text-zinc-500 text-sm mb-2">性别</label>
                    <div class="flex gap-8 bg-white border border-zinc-300 rounded-2xl px-6 py-4">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="gender" value="男" checked class="w-4 h-4 accent">
                            <span class="text-base">男</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="gender" value="女" class="w-4 h-4 accent">
                            <span class="text-base">女</span>
                        </label>
                    </div>
                </div>

                <button type="button" onclick="startFortune()"
                        class="w-full bg-[#5c4033] hover:bg-[#4a3328] text-white font-medium text-lg py-5 rounded-3xl transition-colors flex items-center justify-center gap-3">
                    <i class="fa-solid fa-calculator"></i>
                    开始推算命理
                </button>
            </form>
        </div>

        <!-- 加载 -->
        <div id="loading" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-50">
            <div class="text-center">
                <div class="w-10 h-10 border-4 border-zinc-200 border-t-[#5c4033] rounded-full animate-spin mx-auto"></div>
                <p class="mt-6 text-zinc-500 text-base">天机推演中… 八字与紫微斗数排盘进行中</p>
            </div>
        </div>

        <!-- 结果区域 -->
        <div id="resultCard" class="hidden card rounded-3xl p-8 mt-10">
            <div class="flex justify-between items-center mb-8 pb-6 border-b">
                <h2 class="text-2xl font-medium accent">您的精准命理报告</h2>
                <button onclick="resetForm()" 
                        class="flex items-center gap-2 text-sm text-zinc-500 hover:text-zinc-700">
                    <i class="fa-solid fa-arrow-rotate-left"></i> 重新填写
                </button>
            </div>

            <!-- 基本信息 -->
            <div id="basicInfo" class="mb-10 p-5 bg-zinc-50 rounded-2xl text-sm"></div>

            <!-- 八字 -->
            <div class="mb-10">
                <h3 class="accent text-lg mb-4 font-medium">生辰八字排盘</h3>
                <div id="baziGrid" class="grid grid-cols-4 gap-4"></div>
            </div>

            <!-- 紫微 -->
            <div class="mb-12">
                <h3 class="accent text-lg mb-4 font-medium">紫微斗数命宫主星</h3>
                <div id="ziweiInfo" class="p-6 bg-zinc-50 rounded-2xl"></div>
            </div>

            <!-- 详细分析 -->
            <div class="space-y-12 text-[15px] leading-relaxed">
                <!-- 性格 -->
                <div class="result-section">
                    <h3 class="text-lg font-medium mb-3 accent">性格特点</h3>
                    <div id="personalityText" class="text-zinc-600"></div>
                </div>
                <!-- 姻缘 -->
                <div class="result-section">
                    <h3 class="text-lg font-medium mb-3 accent">姻缘感情</h3>
                    <div id="marriageText" class="text-zinc-600"></div>
                </div>
                <!-- 财运 -->
                <div class="result-section">
                    <h3 class="text-lg font-medium mb-3 accent">财运分析</h3>
                    <div id="wealthText" class="text-zinc-600"></div>
                </div>
                <!-- 事业 -->
                <div class="result-section">
                    <h3 class="text-lg font-medium mb-3 accent">事业发展</h3>
                    <div id="careerText" class="text-zinc-600"></div>
                </div>
                <!-- 一生总结 -->
                <div class="result-section">
                    <h3 class="text-lg font-medium mb-5 accent">一生总结与各年龄段运势转运</h3>
                    <div id="summaryText" class="text-zinc-600 mb-8"></div>
                    <div id="ageSections" class="space-y-7"></div>
                </div>
            </div>

            <div class="mt-12 text-center text-[13px] text-zinc-400">
                本报告基于传统八字与紫微斗数推演，仅供娱乐参考。<br>
                命运由心造，积德行善、努力拼搏方能趋吉避凶。
            </div>
        </div>
    </div>

    <script>
        // 完整省份数据（覆盖中国大陆全部省份）
        const provinces = [
            "北京市","天津市","上海市","重庆市",
            "河北省","山西省","辽宁省","吉林省","黑龙江省",
            "江苏省","浙江省","安徽省","福建省","江西省",
            "山东省","河南省","湖北省","湖南省","广东省",
            "广西壮族自治区","海南省","四川省","贵州省","云南省",
            "陕西省","甘肃省","青海省","内蒙古自治区",
            "宁夏回族自治区","新疆维吾尔自治区","西藏自治区"
        ];

        // 天干地支
        const heavenlyStems = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
        const earthlyBranches = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];

        // 紫微主星
        const ziweiStarsMale = ["紫微","天机","太阳","武曲","天同","廉贞","天府"];
        const ziweiStarsFemale = ["太阴","贪狼","巨门","天相","天梁","七杀","破军"];

        function initSelects() {
            // 年
            const yearSelect = document.getElementById('year');
            for (let y = 1900; y <= 2026; y++) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y + "年";
                if (y === 1990) opt.selected = true;
                yearSelect.appendChild(opt);
            }
            // 月
            const monthSelect = document.getElementById('month');
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m + "月";
                monthSelect.appendChild(opt);
            }
            // 日
            const daySelect = document.getElementById('day');
            for (let d = 1; d <= 30; d++) {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d + "日";
                daySelect.appendChild(opt);
            }
            // 省份
            const provinceSelect = document.getElementById('province');
            provinces.forEach(prov => {
                const opt = document.createElement('option');
                opt.value = prov;
                opt.textContent = prov;
                provinceSelect.appendChild(opt);
            });
        }

        function getShichenName(hourCode) {
            const names = ["子时","丑时","寅时","卯时","辰时","巳时","午时","未时","申时","酉时","戌时","亥时"];
            return names[hourCode];
        }

        function calculateBazi(year, month, day, shichenCode) {
            const yearStem = heavenlyStems[(year - 4) % 10];
            const yearBranch = earthlyBranches[(year - 4) % 12];
            const yearPillar = yearStem + yearBranch;

            const monthStemIdx = (year % 10 * 2 + month) % 10;
            const monthPillar = heavenlyStems[monthStemIdx] + earthlyBranches[(month + 1) % 12];

            const dayStemIdx = (day + year) % 10;
            const dayBranchIdx = (day + 3) % 12;
            const dayPillar = heavenlyStems[dayStemIdx] + earthlyBranches[dayBranchIdx];

            const hourBranch = earthlyBranches[shichenCode];
            const hourStemIdx = (dayStemIdx * 2 + Math.floor(shichenCode / 2)) % 10;
            const hourPillar = heavenlyStems[hourStemIdx] + hourBranch;

            return { year: yearPillar, month: monthPillar, day: dayPillar, hour: hourPillar };
        }

        function generateResult(year, month, day, shichenCode, province, city, gender) {
            const bazi = calculateBazi(year, month, day, shichenCode);
            const mainStar = gender === "男" 
                ? ziweiStarsMale[year % ziweiStarsMale.length] 
                : ziweiStarsFemale[year % ziweiStarsFemale.length];

            // 基本信息
            document.getElementById('basicInfo').innerHTML = `
                <div class="grid grid-cols-2 gap-x-8 gap-y-2 text-sm">
                    <div><span class="text-zinc-400">农历出生：</span>${year}年 ${month}月 ${day}日</div>
                    <div><span class="text-zinc-400">时辰：</span>${getShichenName(shichenCode)}</div>
                    <div><span class="text-zinc-400">出生地：</span>${province} ${city || "未填写"}</div>
                    <div><span class="text-zinc-400">性别：</span>${gender}</div>
                </div>
            `;

            // 八字
            let baziHTML = '';
            const pillars = [
                {name: '年柱', val: bazi.year},
                {name: '月柱', val: bazi.month},
                {name: '日柱', val: bazi.day},
                {name: '时柱', val: bazi.hour}
            ];
            pillars.forEach(p => {
                baziHTML += `
                    <div class="text-center bg-white border border-zinc-200 rounded-2xl py-4">
                        <div class="text-xs text-zinc-400">${p.name}</div>
                        <div class="text-3xl font-medium mt-1 accent">${p.val}</div>
                    </div>`;
            });
            document.getElementById('baziGrid').innerHTML = baziHTML;

            // 紫微
            document.getElementById('ziweiInfo').innerHTML = `
                <div class="flex gap-6 items-center">
                    <div class="w-20 h-20 bg-zinc-100 rounded-2xl flex items-center justify-center text-4xl">⭐</div>
                    <div>
                        <div class="text-base">命宫主星：<span class="font-medium accent">${mainStar}星</span></div>
                        <div class="mt-2 text-zinc-600 text-sm">您的命盘显示${mainStar}星坐守命宫，格局${gender === "男" ? "刚健稳重" : "柔和聪慧"}，一生贵人运极强。</div>
                    </div>
                </div>
            `;

            // 性格特点（详细专业）
            document.getElementById('personalityText').innerHTML = `
                <p>根据您的八字日柱为<strong>${bazi.day}</strong>，紫微斗数命宫主星为<strong>${mainStar}星</strong>，您的性格具有鲜明的传统命理特征：</p>
                <p class="mt-3">• 内心坚韧稳重，做事有条理，责任心极强；</p>
                <p class="mt-2">• 智慧过人，善于规划，领导力和组织能力突出；</p>
                <p class="mt-2">• 重情重义，对家人朋友忠诚，但有时略显固执；</p>
                <p class="mt-2">• 外表温和，内心有主见，遇到困难时能迅速冷静分析。</p>
                <p class="mt-4 text-[#5c4033]">整体性格属于“外柔内刚”型，一生最忌冲动决策，多听取长辈意见可趋吉避凶。</p>
            `;

            // 姻缘感情
            document.getElementById('marriageText').innerHTML = `
                <p>您的姻缘运属于中上格局，日柱${bazi.day}与命宫${mainStar}星共同显示正缘出现较早且稳定。</p>
                <p class="mt-3">25-32岁为正桃花旺期，最易遇到性格互补、门当户对的伴侣。婚姻生活和谐，配偶多为温柔体贴型（男命）/事业型（女命）。</p>
                <p class="mt-3">33-35岁前后需注意“烂桃花”干扰，建议此阶段专注于事业，避免感情纠葛。结婚后夫妻关系稳固，子女缘分极佳。</p>
                <p class="mt-4 text-[#5c4033]">改运建议：农历七月七日可到寺庙或公园求姻缘，婚后多陪伴家人可保家庭和睦。</p>
            `;

            // 财运分析
            document.getElementById('wealthText').innerHTML = `
                <p>您的财运格局为“正财为主，偏财为辅”，日主属${bazi.day[1]}，一生钱财不缺，且有积累能力。</p>
                <p class="mt-3">早年（20-30岁）财运平平，主要靠稳定工资；30岁后进入上升期，35岁和48岁为两大财富高峰，可通过投资或创业获得可观回报。</p>
                <p class="mt-3">适合从事金融、科技、贸易、教育或管理相关行业。晚年（55岁后）财富稳固，可享清福，无需为钱担忧。</p>
                <p class="mt-4 text-[#5c4033]">关键转运：35岁前后大胆但谨慎投资，忌借高利贷。每年农历三月、九月为财神月，宜布局理财规划。</p>
            `;

            // 事业发展
            document.getElementById('careerText').innerHTML = `
                <p>事业运极强，紫微${mainStar}星入命宫显示您天生具有领导才能，贵人运贯穿一生。</p>
                <p class="mt-3">25岁前为学习打基础阶段，28岁后开始步入正轨。35-45岁为事业巅峰期，适合从事管理岗、创业或公职，最易获得晋升。</p>
                <p class="mt-3">40岁前后可能有一次重大职业转折（跳槽或创业），把握住可实现事业飞跃。晚年适合顾问或传承型工作。</p>
                <p class="mt-4 text-[#5c4033]">成功关键：保持低调谦逊，多结交贵人。忌与小人纠缠，40岁前多积累人脉。</p>
            `;

            // 一生总结
            document.getElementById('summaryText').innerHTML = `
                <p>综合八字与紫微斗数，您的命格属于<strong>先苦后甜、中年大成、晚年安康</strong>的典型格局。</p>
                <p class="mt-3">一生贵人运强，家庭和睦，子女孝顺。健康方面注意肝肾与呼吸系统保养，40岁前后为人生重要节点，保持乐观心态即可化解小劫。</p>
                <p class="mt-3">整体运势稳步上升，50岁后进入福寿双全阶段。命运虽有定数，但通过行善积德、努力拼搏，完全可以改运向上。</p>
            `;

            // 年龄段
            const ageData = [
                {range:"0-20岁", desc:"童年家庭环境优越，学业顺利，奠定良好基础。18岁前后开始接触社会，贵人初现。"},
                {range:"21-30岁", desc:"事业起步期，贵人相助，25岁前后有重要机遇（跳槽或深造）。感情逐渐稳定。"},
                {range:"31-40岁", desc:"人生巅峰期，事业与财运同步爆发。35岁为重大转运年，建议大胆布局。"},
                {range:"41-50岁", desc:"守成阶段，家庭美满，子女优秀。需注重健康，避免过度操劳。"},
                {range:"51-60岁", desc:"智慧巅峰，适合传授经验或半退休状态。财富稳固，生活品质高。"},
                {range:"60岁以后", desc:"晚年福寿双全，子孙满堂。建议多旅行养生，享受天伦之乐。"}
            ];

            let ageHTML = '';
            ageData.forEach(item => {
                ageHTML += `
                    <div class="flex gap-6">
                        <div class="w-20 text-right font-medium accent shrink-0">${item.range}</div>
                        <div class="flex-1 text-zinc-600">${item.desc}</div>
                    </div>`;
            });
            document.getElementById('ageSections').innerHTML = ageHTML;
        }

        function startFortune() {
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const day = parseInt(document.getElementById('day').value);
            const shichenCode = parseInt(document.getElementById('shichen').value);
            const province = document.getElementById('province').value;
            const city = document.getElementById('city').value.trim();
            const gender = document.querySelector('input[name="gender"]:checked').value;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('formCard').classList.add('opacity-40');

            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('formCard').classList.add('hidden');
                document.getElementById('resultCard').classList.remove('hidden');

                generateResult(year, month, day, shichenCode, province, city, gender);
            }, 2200);
        }

        function resetForm() {
            document.getElementById('resultCard').classList.add('hidden');
            document.getElementById('formCard').classList.remove('hidden', 'opacity-40');
        }

        window.onload = function() {
            initSelects();
        }
    </script>
</body>
</html>
